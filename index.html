<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Pac-Man Ghost — Live DFA Simulator | ICS3253</title>
    <meta name="description" content="Interactive Deterministic Finite Automaton simulator using Pac-Man ghost AI states: Wandering, Chasing, Frightened, Eaten. ICS3253 Automata Theory & Computation." />
    <meta name="author" content="ICS3253 Automata Theory & Computation" />
    <meta name="keywords" content="DFA, automata, pac-man, ghost AI, state machine, finite automaton, ICS3253" />

    <!-- Theme color for browser chrome -->
    <meta name="theme-color" content="#04090f" />

    <!-- Favicon — inline SVG ghost emoji -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👻</text></svg>" />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- JetBrains Mono font -->
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />

    <!-- Global base styles -->
    <link rel="stylesheet" href="/src/index.css" />

    <style>
      /* Inline critical styles — prevent FOUC */
      body {
        background: #04090f;
        color: #cfd8dc;
        margin: 0;
        font-family: 'JetBrains Mono', monospace;
      }

      /* Loading screen shown before React hydrates */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #04090f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }

      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-ghost {
        font-size: 56px;
        animation: ghostBob 1.2s ease-in-out infinite;
      }

      .loading-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        letter-spacing: 4px;
        color: #29b6f6;
        text-transform: uppercase;
        animation: pulse 1.4s ease-in-out infinite;
      }

      .loading-sub {
        font-family: 'JetBrains Mono', monospace;
        font-size: 8px;
        letter-spacing: 3px;
        color: #1a3a5c;
        text-transform: uppercase;
      }

      @keyframes ghostBob {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-12px); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.4; }
      }
    </style>
  </head>

  <body>
    <!-- Loading screen (hidden once React mounts) -->
    <div id="loading-screen">
      <div class="loading-ghost">👻</div>
      <div class="loading-text">Loading DFA Simulator…</div>
      <div class="loading-sub">ICS3253 · Automata Theory &amp; Computation</div>
    </div>

    <!-- React app root -->
    <div id="root"></div>

    <!-- Vite / React entry point -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Hide loading screen once app has rendered -->
    <script>
      (function() {
        // Use MutationObserver to detect when React has injected content
        const observer = new MutationObserver(function() {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            const screen = document.getElementById('loading-screen');
            if (screen) {
              screen.classList.add('hidden');
              setTimeout(() => screen.remove(), 500);
            }
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      })();
    </script>
  </body>
</html>
